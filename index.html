<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOUNDMATCH</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080608;
      --surface: #100e12;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: rgba(232,228,220,0.4);
    }
    html, body { width:100%; min-height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; }
    body::after {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background: radial-gradient(ellipse at 50% 0%, rgba(80,40,10,0.18) 0%, transparent 60%);
    }
    .stage {
      position:relative; z-index:1;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:56px 20px 64px; gap:48px;
    }
    .header { text-align:center; opacity:0; animation:fadeUp .8s ease .1s forwards; }
    .header .sub { font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:.5em; color:var(--muted); margin-bottom:10px; }
    .header h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(56px,12vw,108px);
      letter-spacing:.1em; line-height:1;
      background:linear-gradient(160deg,#fff 20%,rgba(255,255,255,.4));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .header .tagline { margin-top:12px; font-size:12px; font-weight:300; color:var(--muted); letter-spacing:.18em; }

    /* ── CARDS: always side by side ── */
    .cards {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      width:100%;
      max-width:820px;
    }

    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:6px;
      overflow:hidden;
      cursor:pointer; text-decoration:none; color:inherit;
      display:flex; flex-direction:column;
      opacity:0; transform:translateY(24px);
      transition: transform .4s cubic-bezier(.22,1,.36,1), border-color .3s, box-shadow .3s;
    }
    .card:nth-child(1){ animation:fadeUp .85s cubic-bezier(.22,1,.36,1) .3s forwards; }
    .card:nth-child(2){ animation:fadeUp .85s cubic-bezier(.22,1,.36,1) .45s forwards; }
    .card.rock:hover  { transform:translateY(-5px); border-color:rgba(210,80,0,.55); box-shadow:0 16px 50px rgba(210,80,0,.2); }
    .card.pop:hover   { transform:translateY(-5px); border-color:rgba(220,180,40,.5);  box-shadow:0 16px 50px rgba(220,180,40,.15); }

    .guitar-area {
      height:220px; position:relative;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .card.rock .guitar-area::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 50% 70%, rgba(160,50,0,.3) 0%, transparent 68%);
    }
    .card.pop .guitar-area::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 50% 70%, rgba(180,130,10,.2) 0%, transparent 68%);
    }
    .guitar-svg {
      position:relative; z-index:1;
      filter:drop-shadow(0 8px 28px rgba(0,0,0,.8));
      transition:transform .4s cubic-bezier(.22,1,.36,1), filter .4s;
      max-width:100%; max-height:100%;
    }
    .card.rock:hover .guitar-svg { transform:scale(1.05) rotate(-1deg); filter:drop-shadow(0 12px 40px rgba(210,80,0,.5)); }
    .card.pop:hover  .guitar-svg { transform:scale(1.05) rotate(1deg);  filter:drop-shadow(0 12px 40px rgba(220,160,20,.4)); }

    .card-body {
      padding:18px 22px 22px;
      border-top:1px solid var(--border);
      flex:1; display:flex; flex-direction:column; gap:5px;
    }
    .card-label { font-family:'Bebas Neue',sans-serif; font-size:9px; letter-spacing:.4em; }
    .card.rock .card-label { color:rgba(210,90,0,.85); }
    .card.pop  .card-label { color:rgba(210,160,20,.85); }
    .card-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:.08em; }
    .card-sub   { font-size:11px; font-weight:300; color:var(--muted); }
    .card-cta {
      margin-top:auto; padding-top:12px;
      display:flex; align-items:center; gap:8px;
      font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:.3em;
      color:var(--muted); transition:color .3s, gap .3s;
    }
    .card.rock:hover .card-cta { color:#d45a00; gap:13px; }
    .card.pop:hover  .card-cta { color:#d4a010; gap:13px; }
    .arrow { font-size:14px; transition:transform .3s; }
    .card:hover .arrow { transform:translateX(4px); }

    .footer {
      font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:.28em;
      color:rgba(232,228,220,.15); text-align:center;
      opacity:0; animation:fadeUp .8s ease .6s forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media(max-width:580px){
      .cards { grid-template-columns:1fr; max-width:340px; }
    }
  </style>
</head>
